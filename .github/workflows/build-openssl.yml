# Rebuild the embedded OpenSSL WebAssembly module (openssl.js + openssl.wasm)
# Manual trigger only; result is delivered as a pull request for review.
name: Build OpenSSL WebAssembly

on:
  workflow_dispatch:
    inputs:
      openssl_branch:
        description: OpenSSL git branch/tag to build (current LTS = openssl-3.5)
        default: openssl-3.5
        required: true
      emsdk_version:
        description: Emscripten SDK version (pin for reproducibility)
        default: 4.0.23
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984 # v16
        with:
          version: ${{ inputs.emsdk_version }}

      - name: Clone OpenSSL
        run: git clone --depth 1 -b "${{ inputs.openssl_branch }}" https://github.com/openssl/openssl.git "${{ runner.temp }}/openssl"

      - name: Configure
        working-directory: ${{ runner.temp }}/openssl
        run: |
          emconfigure ./Configure no-hw no-shared no-asm no-threads no-ssl3 no-dtls no-engine no-dso linux-x32 -static
          sed -i 's/$(CROSS_COMPILE)//' Makefile

      - name: Build
        working-directory: ${{ runner.temp }}/openssl
        run: |
          emmake make -j$(nproc) build_generated libssl.a libcrypto.a apps/openssl \
            CFLAGS="-O2 -s ENVIRONMENT='web' -s FILESYSTEM=1 -s MODULARIZE=1 -s EXPORTED_RUNTIME_METHODS=\"['callMain', 'FS', 'TTY']\" -s INVOKE_RUN=0 -s EXIT_RUNTIME=1 -s EXPORT_ES6=0 -s EXPORT_NAME='CreeP7M_openssl' -s ALLOW_MEMORY_GROWTH=1 -l proxyfs.js"

      - name: Stage binaries
        id: stage
        run: |
          cp "${{ runner.temp }}/openssl/apps/openssl" CreeP7M/openssl/openssl.js
          cp "${{ runner.temp }}/openssl/apps/openssl.wasm" CreeP7M/openssl/openssl.wasm
          {
            echo "openssl_branch=${{ inputs.openssl_branch }}"
            echo "openssl_commit=$(git -C "${{ runner.temp }}/openssl" rev-parse HEAD)"
            echo "emcc_version=$(emcc --version | head -1)"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee CreeP7M/openssl/BUILDINFO.txt >> "$GITHUB_OUTPUT"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
          OPENSSL_BRANCH: ${{ inputs.openssl_branch }}
          OPENSSL_COMMIT: ${{ steps.stage.outputs.openssl_commit }}
          EMCC_VERSION: ${{ steps.stage.outputs.emcc_version }}
          BUILT_AT: ${{ steps.stage.outputs.built_at }}
        run: |
          branch="ci/openssl-build-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add CreeP7M/openssl
          git commit -m "rebuild openssl.wasm from ${OPENSSL_BRANCH}"
          git push -u origin "$branch"
          gh pr create --base "${{ github.ref_name }}" --head "$branch" \
            --title "rebuild openssl.wasm (${OPENSSL_BRANCH})" \
            --body "$(printf '%s\n' \
              'Automated OpenSSL WebAssembly rebuild.' \
              '' \
              "- openssl branch: ${OPENSSL_BRANCH}" \
              "- openssl commit: ${OPENSSL_COMMIT}" \
              "- ${EMCC_VERSION}" \
              "- built at: ${BUILT_AT}" \
              '' \
              '> [!WARNING]' \
              '> Binary is not exercised in CI. Load examples/CreeP7M.html, clear the cache, and verify a p7m (extract / verify / details / revocation) before merging.')"
